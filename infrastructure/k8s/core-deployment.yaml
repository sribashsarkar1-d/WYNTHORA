apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: core-engine
  template:
    metadata:
      labels:
        app: core-engine
    spec:
      containers:
      - name: core-engine
        image: core-engine:latest
        ports:
        - containerPort: 8080